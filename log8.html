<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NODE6 // DOC B ACCESS</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:hidden;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* window */
.window{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    border:2px solid #003300;
    background:rgba(0,0,0,0.92);
    padding:20px;
    text-align:center;
}

input{
    width:80%;
    padding:10px;
    margin-top:10px;
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    font-family:"Courier New", monospace;
}

button{
    margin-top:10px;
    padding:8px;
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    cursor:pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="window">

<h2>DOCUMENT B ACCESS</h2>

<p>ENTER AUTHORIZATION CODE</p>

<input id="code" placeholder="********">
<br>
<button onclick="check()">UNLOCK</button>

<p id="msg"></p>

</div>

<script>

/* MATRIX */
const c=document.getElementById("matrix");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let f=14;
let w=c.width/f;
let d=Array(Math.floor(w)).fill(1);

function draw(){
    x.fillStyle="rgba(0,0,0,0.08)";
    x.fillRect(0,0,c.width,c.height);

    x.fillStyle="#00ff66";
    x.font=f+"px monospace";

    for(let i=0;i<d.length;i++){
        let t="PRISMLOCKACCESS".split("")[Math.random()*16|0];
        x.fillText(t,i*f,d[i]*f);

        if(d[i]*f>c.height && Math.random()>0.975)
            d[i]=0;

        d[i]++;
    }
}
setInterval(draw,35);

/* CODE CHECK */
function check(){
    const v=document.getElementById("code").value;

    if(v === "pan1c-pr0tor01-d0ne"){
        document.getElementById("msg").innerText="ACCESS GRANTED";

        setTimeout(()=>{
            window.location.href="node6_docB.html";
        },1200);

    } else {
        document.getElementById("msg").innerText="ACCESS DENIED";
    }
}

</script>

</body>
</html>
