<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIRRORTRACE // NODE 2</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:hidden;
}

/* 🌧️ matrix */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* 🪟 window */
.window{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    border:2px solid #003300;
    background:rgba(0,0,0,0.85);
    text-align:center;
    padding:20px;

    animation: float 6s ease-in-out infinite;
}

/* buttons */
button{
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:10px 15px;
    margin:8px;
    cursor:pointer;
}

button:hover{
    background:#00ff66;
    color:black;
}

/* 💚 ADDED ACCESS BOX */
.access-box{
    position:absolute;
    top:calc(50% + 260px);
    left:50%;
    transform:translateX(-50%);
    width:420px;
    text-align:center;
}

.access-box input{
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:10px;
    width:70%;
    margin-top:10px;
    font-family:"Courier New", monospace;
}

#msg{
    margin-top:10px;
    color:#00ff66;
}

/* float */
@keyframes float{
    0%{transform:translate(-50%,-50%) translateY(0);}
    50%{transform:translate(-50%,-50%) translateY(-5px);}
    100%{transform:translate(-50%,-50%) translateY(0);}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="window">
    <h2>MIRRORTRACE // ARCHIVE</h2>
    <p>data segments available</p>

    <button onclick="location.href='log1.html'">DOC.1</button>
    <button onclick="location.href='log2.html'">DOC.2</button>
    <button onclick="location.href='log3.html'">DOC.3</button>
    <button onclick="location.href='log4.html'">DOC.4</button>
</div>

<!-- 💚 ADDED INPUT FIELD -->
<div class="access-box">
    <p>ACCESS KEY REQUIRED</p>

    <input type="text" id="key" placeholder="enter key...">
    <button onclick="checkKey()">UNLOCK</button>

    <p id="msg"></p>
</div>

<script>
/* 🌧️ MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let letters="01MIRRORTRACEVOIDNOISE23".split("");
let fontSize=14;
let columns=canvas.width/fontSize;

let drops=Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff66";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}

setInterval(draw,35);

/* 💚 ACCESS CHECK */
function checkKey() {
    const input = document.getElementById("key").value;

    if (input === "PRISMLOCK") {
        document.getElementById("msg").innerText =
            "ACCESS GRANTED // REDIRECTING TO NODE 3";

        setTimeout(() => {
            window.location.href = "node3.html";
        }, 1500);
    } else {
        document.getElementById("msg").innerText =
            "ACCESS DENIED";
    }
}
</script>

</body>
</html>
