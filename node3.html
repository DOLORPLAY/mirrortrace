<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIRRORTRACE // NODE 3</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:hidden;
}

/* glitch */
.glitch{
    animation:flicker 1.2s infinite;
}

@keyframes flicker{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

/* matrix */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* window */
.window{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:520px;
    border:2px solid #003300;
    background:rgba(0,0,0,0.92);
    padding:20px;
}

/* log box */
#logs{
    height:220px;
    overflow:hidden;
    border:1px solid #00ff66;
    padding:10px;
    margin-top:10px;
}

/* warning bar */
.warning{
    margin-top:10px;
    border-top:1px solid #00ff66;
    padding-top:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="window">

    <h2 class="glitch">MIRRORTRACE // NODE 3</h2>

    <p class="glitch">PRISMLOCK EVENT: ACTIVE (FORMAT MODE)</p>

    <div id="logs"></div>

    <div class="warning glitch">
        DATA INTEGRITY: REBUILDING FRAGMENTS...
    </div>

</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let letters="PRISMLOCKFORMATDATAREBUILDERRORTRACE".split("");
let fontSize=14;
let columns=canvas.width/fontSize;

let drops=Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff66";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,35);

/* LOGIC */
const logs = document.getElementById("logs");

const messages = [
"PRISMLOCK COMMAND RECEIVED...",
"INITIATING EMERGENCY DATA FORMAT SEQUENCE",
"UNMOUNTING ARCHIVE SEGMENTS...",
"WARNING: NODE STRUCTURE COLLAPSING",
"REBUILDING MIRROR LAYERS...",
"DATA LOSS DETECTED: 34%",
"DATA LOSS DETECTED: 51%",
"RECOVERY ATTEMPT IN PROGRESS...",
"FRAGMENT SYNC: FAILED",
"NEW STATE: PARTIALLY REWRITTEN ARCHIVE"
];

let i = 0;

function addLog(){
    if(i < messages.length){
        let line = document.createElement("div");
        line.innerText = "> " + messages[i];
        logs.appendChild(line);
        logs.scrollTop = logs.scrollHeight;
        i++;
    } else {
        let line = document.createElement("div");
        line.innerText = "> PRISM STATE: ACTIVE // SYSTEM UNSTABLE";
        logs.appendChild(line);
    }
}

setInterval(addLog, 1100);

</script>

</body>
</html>
