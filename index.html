<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIRRORTRACE // NODE 1</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:hidden;
}

/* 🌧️ MATRIX */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* 🪟 WINDOW */
.window{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    border:2px solid #003300;
    background:rgba(0,0,0,0.85);
    text-align:center;
    padding:20px;

    z-index:2;
    animation: float 6s ease-in-out infinite;
}

/* 🔑 INPUT */
#secretInput{
    position:fixed;
    top:10px;
    right:10px;

    width:140px;
    height:28px;

    background:black;
    border:1px solid #00ff66;
    color:#00ff66;

    font-family:monospace;
    outline:none;

    z-index:9999;
    box-shadow:0 0 8px #00ff66;
}

/* BUTTONS */
button{
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    padding:10px 15px;
    margin:8px;
    cursor:pointer;
}

button:hover{
    background:#00ff66;
    color:black;
}

/* FLOAT */
@keyframes float{
    0%{transform:translate(-50%,-50%) translateY(0);}
    50%{transform:translate(-50%,-50%) translateY(-5px);}
    100%{transform:translate(-50%,-50%) translateY(0);}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<input id="secretInput" placeholder="access code">

<div class="window">

    <h2>MIRRORTRACE // NODE 1</h2>
    <p>system online</p>
    <p>voidnoise23</p>

    <hr style="border:1px solid #003300">

    <button onclick="window.location.href='node2.html'">
        [NEXT PAGE]
    </button>

    <button onclick="alert('EXIT GRANTED')">
        [EXIT]
    </button>

</div>

<script>
/* 🔑 CODE SYSTEM (UPDATED) */
const input=document.getElementById("secretInput");

input.addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        if(input.value==="voidnoise23"){
            window.location.href="node2.html";
        }else{
            input.value="";
        }
    }
});

/* 🌧️ MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let letters="01MIRRORTRACEVOIDNOISE23".split("");
let fontSize=14;
let columns=canvas.width/fontSize;

let drops=Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff66";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}

setInterval(draw,35);
</script>

</body>
</html>
